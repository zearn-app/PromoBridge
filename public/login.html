<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Log in — PromoConnect</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="/css/style.css" />
</head>
<body class="min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-md">
  <a href="/" class="pc-logo text-xl block text-center mb-6">Promo<span class="dot">•</span>Connect</a>

  <div class="panel p-8">
    <h1 class="font-display text-2xl font-semibold mb-1">Welcome back</h1>
    <p class="text-sm text-slate-500 mb-6">Log in to your ledger.</p>

    <form id="loginForm" class="space-y-4">
      <div>
        <label class="field-label" for="email">Email</label>
        <input id="email" type="email" placeholder="you@example.com" required class="field" />
      </div>
      <div>
        <div class="flex items-center justify-between">
          <label class="field-label" for="password">Password</label>
          <button type="button" id="forgotPasswordLink" class="text-xs font-medium mb-1" style="color:var(--brass-dark)">Forgot password?</button>
        </div>
        <div class="relative">
          <input id="password" type="password" placeholder="••••••••" required class="field pr-12" />
          <button type="button" id="togglePassword" class="password-toggle" aria-label="Show password">
            <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Log in</button>
    </form>

    <div class="my-5 flex items-center gap-3 text-xs text-slate-400">
      <div class="h-px bg-slate-200 flex-1"></div> OR <div class="h-px bg-slate-200 flex-1"></div>
    </div>

    <button id="googleBtn" class="btn btn-outline btn-block">Continue with Google</button>

    <p class="mt-6 text-sm text-center text-slate-500">
      New here? <a href="/signup.html" class="font-medium" style="color:var(--brass-dark)">Create an account</a>
    </p>
    <p id="errorMsg" class="mt-3 text-sm text-center" style="color:var(--brick)"></p>
  </div>
</div>

<!-- Forgot password modal -->
<div id="forgotModal" class="fixed inset-0 bg-black/40 hidden items-center justify-center z-50 p-4">
  <div class="panel p-6 w-full max-w-sm">
    <h3 class="font-display font-semibold text-lg mb-1">Reset your password</h3>
    <p class="text-xs text-slate-500 mb-4">Enter your account email — we'll send a reset link to it.</p>
    <form id="forgotForm" class="space-y-3">
      <input id="forgotEmail" type="email" placeholder="you@example.com" required class="field" />
      <div class="flex gap-2">
        <button type="submit" class="btn btn-primary flex-1">Send reset link</button>
        <button type="button" id="closeForgotModal" class="btn btn-outline flex-1">Cancel</button>
      </div>
      <p id="forgotMsg" class="text-xs text-center"></p>
    </form>
  </div>
</div>

<script type="module">
  import { auth, googleProvider, signInWithRedirect, getRedirectResult, signInWithEmailAndPassword, sendPasswordResetEmail } from '/js/firebase-config.js';
  import { api } from '/js/api.js';

  const GOOGLE_ERROR_MESSAGES = {
    'auth/unauthorized-domain': 'This site\'s domain isn\'t authorized for Google sign-in yet. In Firebase Console → Authentication → Settings → Authorized domains, add this exact domain.',
    'auth/operation-not-allowed': 'Google sign-in isn\'t enabled for this project. In Firebase Console → Authentication → Sign-in method, enable Google.',
    'auth/popup-blocked': 'Your browser blocked the Google sign-in popup. Please try again.',
    'auth/cancelled-popup-request': 'Google sign-in was cancelled.',
  };

  function googleErrorMessage(err) {
    return GOOGLE_ERROR_MESSAGES[err.code] || err.message;
  }

  async function routeByRole() {
    try {
      const { user } = await api('/auth/me');
      if (user.role === 'admin') window.location.href = '/pages/admin-dashboard.html';
      else window.location.href = '/pages/home.html';
    } catch (err) {
      document.getElementById('errorMsg').textContent =
        'No profile found for this account. Please sign up first.';
    }
  }

  // On page load, check whether we're returning from a Google redirect
  // (signInWithRedirect navigates away and back, rather than opening a
  // popup — popups are unreliable on mobile browsers, so this is the
  // flow Google recommends there).
  (async function checkRedirectResult() {
    try {
      const result = await getRedirectResult(auth);
      if (result) await routeByRole();
    } catch (err) {
      document.getElementById('errorMsg').textContent = googleErrorMessage(err);
    }
  })();

  document.getElementById('togglePassword').addEventListener('click', () => {
    const input = document.getElementById('password');
    const showing = input.type === 'text';
    input.type = showing ? 'password' : 'text';
    document.getElementById('togglePassword').setAttribute('aria-label', showing ? 'Show password' : 'Hide password');
    document.getElementById('eyeIcon').innerHTML = showing
      ? '<path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="12" r="3"/>'
      : '<path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="12" r="3"/><path d="M3 3l18 18" stroke-linecap="round"/>';
  });

  document.getElementById('forgotPasswordLink').addEventListener('click', () => {
    document.getElementById('forgotEmail').value = document.getElementById('email').value.trim();
    document.getElementById('forgotMsg').textContent = '';
    document.getElementById('forgotModal').classList.remove('hidden');
    document.getElementById('forgotModal').classList.add('flex');
  });

  document.getElementById('closeForgotModal').addEventListener('click', () => {
    document.getElementById('forgotModal').classList.add('hidden');
  });

  document.getElementById('forgotForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('forgotEmail').value.trim();
    const msgEl = document.getElementById('forgotMsg');
    msgEl.style.color = '';

    try {
      await sendPasswordResetEmail(auth, email);
      msgEl.style.color = 'var(--ledger-green)';
      msgEl.textContent = 'If an account exists for that email, a reset link is on its way — check your inbox.';
    } catch (err) {
      // Don't reveal whether an email is registered — show the same
      // success message for "user not found" as for a real send, and
      // only surface real input errors (like a malformed address).
      if (err.code === 'auth/user-not-found') {
        msgEl.style.color = 'var(--ledger-green)';
        msgEl.textContent = 'If an account exists for that email, a reset link is on its way — check your inbox.';
      } else {
        msgEl.style.color = 'var(--brick)';
        msgEl.textContent = err.code === 'auth/invalid-email' ? 'Please enter a valid email address.' : err.message;
      }
    }
  });

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    try {
      await signInWithEmailAndPassword(auth, email, password);
      await routeByRole();
    } catch (err) {
      document.getElementById('errorMsg').textContent = err.message;
    }
  });

  document.getElementById('googleBtn').addEventListener('click', async () => {
    try {
      await signInWithRedirect(auth, googleProvider);
      // Browser navigates away here; checkRedirectResult() picks up
      // the result when the page reloads after Google sends us back.
    } catch (err) {
      document.getElementById('errorMsg').textContent = googleErrorMessage(err);
    }
  });
</script>
</body>
</html>
