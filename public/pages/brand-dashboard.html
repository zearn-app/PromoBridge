<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Brand Dashboard — PromoConnect</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<link rel="stylesheet" href="/css/style.css" />
</head>
<body class="min-h-screen">

<header class="pc-nav sticky top-0 z-40">
  <nav class="max-w-6xl mx-auto flex items-center justify-between px-4 py-4">
    <a href="/" class="pc-logo text-xl">Promo<span class="dot">•</span>Connect</a>
    <div class="flex items-center gap-4">
      <a href="/pages/search-influencers.html" class="pc-navlink">Find Creators</a>
      <span id="userName" class="text-sm text-slate-500 hide-mobile"></span>
      <button id="logoutBtn" class="btn btn-outline btn-sm">Log out</button>
    </div>
  </nav>
</header>

<main class="max-w-6xl mx-auto px-4 py-8 space-y-8">

  <section class="grid grid-cols-2 sm:grid-cols-4 gap-4">
    <div class="stat-tile">
      <p class="stat-label">Active campaigns</p>
      <p id="statActive" class="stat-value">–</p>
    </div>
    <div class="stat-tile">
      <p class="stat-label">Budget on file</p>
      <p id="statBudget" class="stat-value">–</p>
    </div>
    <div class="stat-tile">
      <p class="stat-label">Requests sent</p>
      <p id="statRequests" class="stat-value">–</p>
    </div>
    <div class="stat-tile">
      <p class="stat-label">Total spent</p>
      <p id="statSpent" class="stat-value">–</p>
    </div>
  </section>

  <div class="grid lg:grid-cols-3 gap-8">
    <section class="panel p-6 lg:col-span-1">
      <h2 class="font-display text-lg font-semibold mb-4">Company profile</h2>
      <form id="profileForm" class="space-y-3">
        <div>
          <label class="field-label" for="companyName">Company name</label>
          <input id="companyName" class="field" />
        </div>
        <div>
          <label class="field-label" for="industry">Industry</label>
          <input id="industry" class="field" />
        </div>
        <div>
          <label class="field-label" for="budget">Typical campaign budget (₹)</label>
          <input id="budget" type="number" min="0" class="field" />
        </div>
        <div>
          <label class="field-label" for="logoUrl">Logo image URL</label>
          <input id="logoUrl" placeholder="https://…" class="field" />
        </div>
        <button type="submit" class="btn btn-primary btn-block">Save profile</button>
      </form>

      <hr class="perforated my-5" />

      <h3 class="font-display font-semibold text-sm mb-3">Post a campaign</h3>
      <form id="campaignForm" class="space-y-2">
        <input id="title" placeholder="Campaign title" required class="field" />
        <textarea id="description" placeholder="Campaign details" rows="3" required class="field"></textarea>
        <input id="targetAudience" placeholder="Target audience" class="field" />
        <input id="campaignBudget" type="number" min="0" placeholder="Budget (₹)" required class="field" />
        <input id="timeline" placeholder="Timeline (e.g. 2 weeks)" class="field" />
        <button type="submit" class="btn btn-outline btn-block">Post campaign</button>
      </form>
    </section>

    <section class="panel p-6 lg:col-span-2">
      <h2 class="font-display text-lg font-semibold mb-4">Requests sent to creators</h2>
      <div id="requestsList" class="space-y-3">
        <p class="empty-state">Loading…</p>
      </div>
    </section>
  </div>

  <section class="panel p-6">
    <h2 class="font-display text-lg font-semibold mb-4">My campaigns</h2>
    <div id="campaignsList" class="grid sm:grid-cols-2 gap-4"></div>
  </section>

</main>

<!-- Report modal -->
<div id="reportModal" class="fixed inset-0 bg-black/40 hidden items-center justify-center z-50 p-4">
  <div class="panel p-6 w-full max-w-sm">
    <h3 class="font-display font-semibold text-lg mb-1">Report a problem</h3>
    <p class="text-xs text-slate-500 mb-4">This goes straight to the admin team for review.</p>
    <form id="reportForm" class="space-y-3">
      <textarea id="reportReason" rows="4" placeholder="What happened?" required class="field"></textarea>
      <div class="flex gap-2">
        <button type="submit" class="btn btn-danger flex-1">Submit report</button>
        <button type="button" id="closeReportModal" class="btn btn-outline flex-1">Cancel</button>
      </div>
    </form>
  </div>
</div>

<script type="module">
  import { auth, signOut } from '/js/firebase-config.js';
  import { api, requireLogin, showToast } from '/js/api.js';

  let currentUser;
  let reportTargetUid = null;
  let reportTargetRequestId = null;

  requireLogin(async (user) => {
    currentUser = user;
    document.getElementById('userName').textContent = user.displayName || user.email;
    await loadProfile();
    await loadCampaigns();
    await loadRequests();
  });

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await signOut(auth);
    window.location.href = '/login.html';
  });

  async function loadProfile() {
    try {
      const { brand } = await api(`/brands/${currentUser.uid}`);
      document.getElementById('companyName').value = brand.companyName || '';
      document.getElementById('industry').value = brand.industry || '';
      document.getElementById('budget').value = brand.budget || '';
      document.getElementById('logoUrl').value = brand.logoUrl || '';
      document.getElementById('statBudget').textContent = brand.budget ? `₹${brand.budget}` : '–';
    } catch (err) {
      console.warn('No profile yet:', err.message);
    }
  }

  document.getElementById('profileForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    try {
      await api('/brands/profile/update', {
        method: 'PUT',
        body: {
          companyName: document.getElementById('companyName').value,
          industry: document.getElementById('industry').value,
          budget: Number(document.getElementById('budget').value || 0),
          logoUrl: document.getElementById('logoUrl').value || undefined,
        },
      });
      showToast('Profile saved');
    } catch (err) {
      showToast(err.message, true);
    }
  });

  document.getElementById('campaignForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    try {
      await api('/campaigns', {
        method: 'POST',
        body: {
          title: document.getElementById('title').value,
          description: document.getElementById('description').value,
          targetAudience: document.getElementById('targetAudience').value,
          budget: Number(document.getElementById('campaignBudget').value),
          timeline: document.getElementById('timeline').value,
        },
      });
      showToast('Campaign posted');
      e.target.reset();
      await loadCampaigns();
    } catch (err) {
      showToast(err.message, true);
    }
  });

  async function loadCampaigns() {
    const container = document.getElementById('campaignsList');
    try {
      const { campaigns } = await api('/campaigns/mine/list');
      document.getElementById('statActive').textContent = campaigns.filter(c => c.status === 'open').length;
      container.innerHTML = campaigns.length
        ? campaigns.map(c => `
          <div class="panel p-4">
            <div class="flex items-start justify-between gap-2">
              <p class="font-medium text-sm">${escapeHtml(c.title)}</p>
              <span class="stamp stamp-${c.status}">${c.status}</span>
            </div>
            <p class="text-xs text-slate-500 mt-2 font-mono">₹${c.budget}</p>
            ${c.status === 'open' ? `<button class="closeBtn btn btn-ghost btn-sm mt-3" data-id="${c.id}">Close campaign</button>` : ''}
          </div>`).join('')
        : '<p class="empty-state">No campaigns posted yet.</p>';

      container.querySelectorAll('.closeBtn').forEach(btn =>
        btn.addEventListener('click', () => closeCampaign(btn.dataset.id)));
    } catch (err) {
      container.innerHTML = `<p class="empty-state" style="color:var(--brick)">${err.message}</p>`;
    }
  }

  async function closeCampaign(id) {
    try {
      await api(`/campaigns/${id}/close`, { method: 'PATCH' });
      showToast('Campaign closed');
      await loadCampaigns();
    } catch (err) {
      showToast(err.message, true);
    }
  }

  async function loadRequests() {
    const container = document.getElementById('requestsList');
    try {
      const { requests } = await api('/requests/mine/list');
      document.getElementById('statRequests').textContent = requests.length;

      const { payments } = await api('/payments/mine/list');
      const spent = payments.filter(p => p.status !== 'created').reduce((s, p) => s + p.amount, 0);
      document.getElementById('statSpent').textContent = `₹${spent.toFixed(2)}`;

      container.innerHTML = requests.length ? requests.map(r => {
        const payment = payments.find(p => p.requestId === r.id);
        return `
        <div class="receipt">
          <div class="receipt-side">
            <p class="receipt-eyebrow">Offer</p>
            <p class="receipt-amount mt-1">₹${r.amount}</p>
          </div>
          <div class="receipt-divider"></div>
          <div class="receipt-side flex flex-col justify-between">
            <div>
              <p class="receipt-eyebrow">Status</p>
              <span class="stamp stamp-${r.status} mt-1">${r.status}</span>
            </div>
            <div class="flex gap-2 mt-3 flex-wrap">
              ${r.status === 'accepted' && (!payment || payment.status === 'created')
                ? `<button class="payBtn btn btn-brass btn-sm" data-id="${r.id}">Pay now</button>`
                : payment ? `<span class="stamp stamp-${payment.status}">${payment.status}</span>` : ''
              }
              <button class="reportBtn btn btn-ghost btn-sm" data-id="${r.id}" data-uid="${r.influencerId}">Report a problem</button>
            </div>
          </div>
        </div>`;
      }).join('') : '<p class="empty-state">No requests sent yet. Find creators to get started.</p>';

      container.querySelectorAll('.payBtn').forEach(btn =>
        btn.addEventListener('click', () => payForRequest(btn.dataset.id)));
      container.querySelectorAll('.reportBtn').forEach(btn =>
        btn.addEventListener('click', () => openReportModal(btn.dataset.uid, btn.dataset.id)));
    } catch (err) {
      container.innerHTML = `<p class="empty-state" style="color:var(--brick)">${err.message}</p>`;
    }
  }

  async function payForRequest(requestId) {
    try {
      const order = await api('/payments/create-order', { method: 'POST', body: { requestId } });

      const rzp = new Razorpay({
        key: order.keyId,
        amount: order.amount,
        currency: order.currency,
        order_id: order.orderId,
        name: 'PromoConnect',
        description: 'Influencer promotion payment',
        handler: async (response) => {
          try {
            await api('/payments/verify', {
              method: 'POST',
              body: {
                paymentId: order.paymentId,
                razorpay_order_id: response.razorpay_order_id,
                razorpay_payment_id: response.razorpay_payment_id,
                razorpay_signature: response.razorpay_signature,
              },
            });
            showToast('Payment successful');
            await loadRequests();
          } catch (err) {
            showToast(err.message, true);
          }
        },
        theme: { color: '#b8863c' },
      });

      rzp.open();
    } catch (err) {
      showToast(err.message, true);
    }
  }

  function openReportModal(uid, requestId) {
    reportTargetUid = uid;
    reportTargetRequestId = requestId;
    document.getElementById('reportModal').classList.remove('hidden');
    document.getElementById('reportModal').classList.add('flex');
  }
  document.getElementById('closeReportModal').addEventListener('click', () => {
    document.getElementById('reportModal').classList.add('hidden');
  });
  document.getElementById('reportForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    try {
      await api('/reports', {
        method: 'POST',
        body: {
          againstUid: reportTargetUid,
          requestId: reportTargetRequestId,
          reason: document.getElementById('reportReason').value,
        },
      });
      showToast('Report submitted');
      document.getElementById('reportModal').classList.add('hidden');
      e.target.reset();
    } catch (err) {
      showToast(err.message, true);
    }
  });

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }
</script>
</body>
</html>
