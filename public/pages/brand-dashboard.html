<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dashboard — PromoConnect</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="/css/style.css" />
</head>
<body class="min-h-screen">

<header class="pc-nav sticky top-0 z-40">
  <nav class="max-w-6xl mx-auto flex items-center justify-between px-4 py-4">
    <a href="/pages/home.html" class="pc-logo text-xl">Promo<span class="dot">•</span>Connect</a>
    <a href="/pages/profile.html" class="pc-navlink">&larr; Back to profile</a>
  </nav>
</header>

<main class="max-w-4xl mx-auto px-4 py-8 space-y-8">
  <h1 class="font-display text-2xl font-semibold">Dashboard</h1>

  <section class="grid grid-cols-2 sm:grid-cols-3 gap-4">
    <div class="stat-tile"><p class="stat-label">Total campaigns</p><p id="statCampaigns" class="stat-value">–</p></div>
    <div class="stat-tile"><p class="stat-label">Active orders</p><p id="statActive" class="stat-value">–</p></div>
    <div class="stat-tile"><p class="stat-label">Completed orders</p><p id="statCompleted" class="stat-value">–</p></div>
    <div class="stat-tile"><p class="stat-label">Total spent</p><p id="statSpent" class="stat-value">–</p></div>
    <div class="stat-tile"><p class="stat-label">Pending payments</p><p id="statPending" class="stat-value">–</p></div>
    <div class="stat-tile"><p class="stat-label">Cancelled orders</p><p id="statCancelled" class="stat-value">–</p></div>
  </section>

  <section class="panel p-6">
    <h2 class="font-display text-lg font-semibold mb-4">Order pipeline</h2>
    <div id="pipeline" class="space-y-2"></div>
  </section>

  <section class="panel p-6">
    <div class="flex items-center justify-between mb-4">
      <h2 class="font-display text-lg font-semibold">Campaigns</h2>
      <a href="/pages/profile.html" class="text-xs" style="color:var(--brass-dark)">Manage profile &rarr;</a>
    </div>
    <div id="campaignsList" class="grid sm:grid-cols-2 gap-4"></div>
  </section>
</main>

<script type="module">
  import { api, requireLogin, showToast } from '/js/api.js';

  requireLogin(async () => {
    await loadStats();
    await loadCampaigns();
  });

  const STAGES = ['pending', 'accepted', 'in_progress', 'completed', 'declined', 'cancelled'];

  async function loadStats() {
    try {
      const { requests } = await api('/requests/mine/list');
      const counts = Object.fromEntries(STAGES.map(s => [s, requests.filter(r => r.status === s).length]));

      document.getElementById('statActive').textContent = counts.accepted + counts.in_progress;
      document.getElementById('statCompleted').textContent = counts.completed;
      document.getElementById('statCancelled').textContent = counts.cancelled;

      document.getElementById('pipeline').innerHTML = STAGES.map(s => `
        <div class="flex items-center justify-between text-sm border-b py-2" style="border-color:var(--line)">
          <span class="stamp stamp-${s}">${s.replace('_', ' ')}</span>
          <span class="font-mono">${counts[s]}</span>
        </div>`).join('');

      const { payments } = await api('/payments/mine/list');
      const spent = payments.filter(p => p.status !== 'created').reduce((s, p) => s + p.amount, 0);
      const pending = payments.filter(p => p.status === 'created').reduce((s, p) => s + p.amount, 0);
      document.getElementById('statSpent').textContent = `₹${spent.toFixed(2)}`;
      document.getElementById('statPending').textContent = `₹${pending.toFixed(2)}`;
    } catch (err) {
      showToast(err.message, true);
    }
  }

  async function loadCampaigns() {
    const container = document.getElementById('campaignsList');
    try {
      const { campaigns } = await api('/campaigns/mine/list');
      document.getElementById('statCampaigns').textContent = campaigns.length;
      container.innerHTML = campaigns.length ? campaigns.map(c => `
        <div class="panel p-4">
          <div class="flex items-start justify-between gap-2">
            <p class="font-medium text-sm">${escapeHtml(c.title)}</p>
            <span class="stamp stamp-${c.status}">${c.status}</span>
          </div>
          <p class="text-xs text-slate-500 mt-2 font-mono">₹${c.budget}</p>
        </div>`).join('') : '<p class="empty-state">No campaigns posted yet.</p>';
    } catch (err) {
      container.innerHTML = `<p class="empty-state" style="color:var(--brick)">${err.message}</p>`;
    }
  }

  function escapeHtml(str) { const d = document.createElement('div'); d.textContent = str ?? ''; return d.innerHTML; }
</script>
</body>
</html>
