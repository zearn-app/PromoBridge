<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Profile — PromoConnect</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="/css/style.css" />
</head>
<body class="min-h-screen">

<header class="pc-nav sticky top-0 z-40">
  <nav class="max-w-6xl mx-auto flex items-center justify-between px-4 py-4">
    <a href="/pages/home.html" class="pc-logo text-xl">Promo<span class="dot">•</span>Connect</a>
    <button id="logoutBtn" class="btn btn-outline btn-sm">Log out</button>
  </nav>
</header>

<main class="max-w-3xl mx-auto px-4 py-6 space-y-6">

  <div class="flex items-center justify-between">
    <h1 class="font-display text-2xl font-semibold">Your profile</h1>
    <div class="flex gap-2">
      <a id="withdrawLink" href="/pages/withdrawals.html" class="btn btn-brass btn-sm hidden">Withdraw earnings</a>
      <a id="dashboardLink" href="#" class="btn btn-outline btn-sm">View analytics dashboard</a>
    </div>
  </div>

  <!-- Stats -->
  <section class="grid grid-cols-2 sm:grid-cols-4 gap-4">
    <div class="stat-tile"><p class="stat-label" id="statLabel1">–</p><p id="statValue1" class="stat-value">–</p></div>
    <div class="stat-tile"><p class="stat-label">Completed orders</p><p id="statCompleted" class="stat-value">–</p></div>
    <div class="stat-tile"><p class="stat-label">Rating</p><p id="statRating" class="stat-value">New</p></div>
    <div class="stat-tile"><p class="stat-label" id="statLabel2">–</p><p id="statValue2" class="stat-value">–</p></div>
  </section>

  <!-- Influencer profile form -->
  <section id="influencerForm" class="panel p-6 hidden">
    <h2 class="font-display text-lg font-semibold mb-4">Creator details</h2>
    <form id="infForm" class="space-y-3">
      <div class="flex gap-4 items-start">
        <img id="infPhotoPreview" class="w-16 h-16 rounded-full object-cover bg-slate-100 shrink-0" alt="" />
        <div class="flex-1">
          <label class="field-label" for="photoUrl">Profile photo URL</label>
          <input id="photoUrl" placeholder="https://…" class="field" />
        </div>
      </div>
      <div><label class="field-label" for="bio">Bio</label><textarea id="bio" rows="3" class="field"></textarea></div>
      <div class="grid sm:grid-cols-2 gap-3">
        <div><label class="field-label" for="niche">Niche</label><input id="niche" class="field" /></div>
        <div><label class="field-label" for="platform">Primary platform</label>
          <select id="platform" class="field">
            <option value="">Select…</option>
            <option>Instagram</option><option>YouTube</option><option>Facebook</option><option>TikTok</option><option>Other</option>
          </select>
        </div>
        <div><label class="field-label" for="followerCount">Follower count</label><input id="followerCount" type="number" min="0" class="field" /></div>
        <div><label class="field-label" for="location">Location</label><input id="location" class="field" /></div>
      </div>
      <div class="grid sm:grid-cols-2 gap-3">
        <div><label class="field-label" for="instagramUrl">Instagram link</label><input id="instagramUrl" class="field" /></div>
        <div><label class="field-label" for="youtubeUrl">YouTube link</label><input id="youtubeUrl" class="field" /></div>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Save profile</button>
    </form>

    <hr class="perforated my-5" />
    <h3 class="font-display font-semibold text-sm mb-3">Portfolio</h3>
    <form id="galleryForm" class="space-y-2 mb-4">
      <input id="galleryUrl" placeholder="Image / video / post URL" class="field" required />
      <div class="flex gap-2">
        <select id="galleryType" class="field w-auto">
          <option value="image">Image</option><option value="video">Video</option><option value="link">Link</option>
        </select>
        <input id="galleryCaption" placeholder="Caption" class="field flex-1" />
      </div>
      <button type="submit" class="btn btn-outline btn-block">Add to portfolio</button>
    </form>
    <div id="galleryGrid" class="grid grid-cols-2 gap-2"></div>
  </section>

  <!-- Brand profile form -->
  <section id="brandForm" class="panel p-6 hidden">
    <h2 class="font-display text-lg font-semibold mb-4">Company details</h2>
    <form id="brForm" class="space-y-3">
      <div class="flex gap-4 items-start">
        <img id="logoPreview" class="w-16 h-16 rounded-lg object-cover bg-slate-100 shrink-0" alt="" />
        <div class="flex-1">
          <label class="field-label" for="logoUrl">Logo image URL</label>
          <input id="logoUrl" placeholder="https://…" class="field" />
        </div>
      </div>
      <div><label class="field-label" for="companyName">Company name</label><input id="companyName" class="field" /></div>
      <div class="grid sm:grid-cols-2 gap-3">
        <div><label class="field-label" for="industry">Industry</label><input id="industry" class="field" /></div>
        <div><label class="field-label" for="budget">Typical budget (₹)</label><input id="budget" type="number" min="0" class="field" /></div>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Save profile</button>
    </form>
  </section>

</main>

<script type="module">
  import { auth, signOut } from '/js/firebase-config.js';
  import { api, requireLogin, showToast } from '/js/api.js';
  import { renderNav } from '/js/nav.js';

  let role, uid;

  requireLogin(async (user) => {
    await renderNav('profile');
    const { user: appUser } = await api('/auth/me');
    role = appUser.role;
    uid = user.uid;

    document.getElementById('dashboardLink').href = role === 'brand' ? '/pages/brand-dashboard.html' : '/pages/influencer-dashboard.html';

    if (role === 'influencer') {
      document.getElementById('withdrawLink').classList.remove('hidden');
      document.getElementById('influencerForm').classList.remove('hidden');
      document.getElementById('statLabel1').textContent = 'Followers';
      document.getElementById('statLabel2').textContent = 'Earnings released';
      await loadInfluencer();
    } else if (role === 'brand') {
      document.getElementById('brandForm').classList.remove('hidden');
      document.getElementById('statLabel1').textContent = 'Typical budget';
      document.getElementById('statLabel2').textContent = 'Total spent';
      await loadBrand();
    }
    await loadStats();
  });

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await signOut(auth);
    window.location.href = '/login.html';
  });

  async function loadInfluencer() {
    try {
      const { influencer } = await api(`/influencers/${uid}`);
      document.getElementById('bio').value = influencer.bio || '';
      document.getElementById('niche').value = influencer.niche || '';
      document.getElementById('followerCount').value = influencer.followerCount || 0;
      document.getElementById('location').value = influencer.location || '';
      document.getElementById('platform').value = influencer.platform || '';
      document.getElementById('photoUrl').value = influencer.photoUrl || '';
      document.getElementById('instagramUrl').value = influencer.instagramUrl || '';
      document.getElementById('youtubeUrl').value = influencer.youtubeUrl || '';
      document.getElementById('infPhotoPreview').src = influencer.photoUrl || '';
      document.getElementById('statValue1').textContent = (influencer.followerCount || 0).toLocaleString();
      renderGallery(influencer.gallery || []);
    } catch (err) { console.warn(err.message); }
  }

  function renderGallery(items) {
    const grid = document.getElementById('galleryGrid');
    grid.innerHTML = items.length ? items.slice().reverse().map(item => `
      <a href="${escapeAttr(item.url)}" target="_blank" rel="noopener" class="block border rounded-lg p-3 text-xs hover:bg-slate-50" style="border-color:var(--line)">
        <span class="stamp stamp-open mb-2">${escapeHtml(item.type || 'link')}</span>
        <p class="mt-2 text-slate-600 truncate">${escapeHtml(item.caption || item.url)}</p>
      </a>`).join('') : '<p class="empty-state col-span-2 py-4">No portfolio items yet.</p>';
  }

  document.getElementById('infForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    try {
      await api('/influencers/profile/update', {
        method: 'PUT',
        body: {
          bio: document.getElementById('bio').value,
          niche: document.getElementById('niche').value,
          followerCount: Number(document.getElementById('followerCount').value || 0),
          location: document.getElementById('location').value,
          platform: document.getElementById('platform').value || undefined,
          photoUrl: document.getElementById('photoUrl').value || undefined,
          instagramUrl: document.getElementById('instagramUrl').value || undefined,
          youtubeUrl: document.getElementById('youtubeUrl').value || undefined,
        },
      });
      showToast('Profile saved');
      await loadInfluencer();
    } catch (err) { showToast(err.message, true); }
  });

  document.getElementById('galleryForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    try {
      await api('/influencers/gallery/add', {
        method: 'POST',
        body: {
          url: document.getElementById('galleryUrl').value,
          type: document.getElementById('galleryType').value,
          caption: document.getElementById('galleryCaption').value,
        },
      });
      showToast('Added to portfolio');
      e.target.reset();
      await loadInfluencer();
    } catch (err) { showToast(err.message, true); }
  });

  async function loadBrand() {
    try {
      const { brand } = await api(`/brands/${uid}`);
      document.getElementById('companyName').value = brand.companyName || '';
      document.getElementById('industry').value = brand.industry || '';
      document.getElementById('budget').value = brand.budget || '';
      document.getElementById('logoUrl').value = brand.logoUrl || '';
      document.getElementById('logoPreview').src = brand.logoUrl || '';
      document.getElementById('statValue1').textContent = brand.budget ? `₹${brand.budget}` : '–';
    } catch (err) { console.warn(err.message); }
  }

  document.getElementById('brForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    try {
      await api('/brands/profile/update', {
        method: 'PUT',
        body: {
          companyName: document.getElementById('companyName').value,
          industry: document.getElementById('industry').value,
          budget: Number(document.getElementById('budget').value || 0),
          logoUrl: document.getElementById('logoUrl').value || undefined,
        },
      });
      showToast('Profile saved');
      await loadBrand();
    } catch (err) { showToast(err.message, true); }
  });

  async function loadStats() {
    try {
      const { requests } = await api('/requests/mine/list');
      document.getElementById('statCompleted').textContent = requests.filter(r => r.status === 'completed').length;

      const { payments } = await api('/payments/mine/list');
      if (role === 'influencer') {
        const earned = payments.filter(p => p.status === 'paid' || p.status === 'released')
          .reduce((s, p) => s + (p.influencerShare || 0), 0);
        document.getElementById('statValue2').textContent = `₹${earned.toFixed(2)}`;
      } else if (role === 'brand') {
        const spent = payments.filter(p => p.status !== 'created').reduce((s, p) => s + p.amount, 0);
        document.getElementById('statValue2').textContent = `₹${spent.toFixed(2)}`;
      }
    } catch (err) { console.warn(err.message); }
  }

  function escapeHtml(str) { const d = document.createElement('div'); d.textContent = str ?? ''; return d.innerHTML; }
  function escapeAttr(str) { return (str || '').replace(/"/g, '&quot;'); }
</script>
</body>
</html>
