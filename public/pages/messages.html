<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Messages — PromoConnect</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="/css/style.css" />
</head>
<body class="min-h-screen">

<header class="pc-nav sticky top-0 z-40">
  <nav class="max-w-6xl mx-auto flex items-center justify-between px-4 py-4">
    <a href="/pages/home.html" class="pc-logo text-xl">Promo<span class="dot">•</span>Connect</a>
  </nav>
</header>

<main class="max-w-6xl mx-auto px-4 py-6">
  <div class="grid sm:grid-cols-3 gap-5" style="min-height:60vh">

    <!-- Conversation list -->
    <section id="convoListWrap" class="panel p-3 sm:col-span-1">
      <h2 class="font-display font-semibold px-2 py-1 mb-1">Messages</h2>
      <div id="convoList" class="space-y-1"><p class="empty-state">Loading…</p></div>
    </section>

    <!-- Thread -->
    <section id="threadWrap" class="panel p-0 sm:col-span-2 flex flex-col hidden">
      <div class="p-4 border-b flex items-center justify-between" style="border-color:var(--line)">
        <p id="threadName" class="font-display font-semibold"></p>
        <button id="backToList" class="btn btn-ghost btn-sm sm:hidden">Back</button>
      </div>
      <div id="threadMessages" class="flex-1 overflow-y-auto p-4 space-y-2" style="max-height:50vh"></div>
      <form id="sendForm" class="p-3 border-t flex gap-2" style="border-color:var(--line)">
        <input id="attachmentUrl" placeholder="Attachment URL (optional)" class="field hidden" />
        <button type="button" id="toggleAttachment" class="btn btn-outline btn-sm">📎</button>
        <input id="messageText" placeholder="Type a message…" required class="field flex-1" />
        <button type="submit" class="btn btn-primary">Send</button>
      </form>
    </section>

  </div>
</main>

<script type="module">
  import { api, requireLogin, showToast } from '/js/api.js';
  import { renderNav } from '/js/nav.js';

  const params = new URLSearchParams(window.location.search);
  let currentConversationId = null;
  let currentOtherUid = params.get('to') || null;
  let pendingRequestId = params.get('requestId') || null;
  let pollTimer = null;

  requireLogin(async () => {
    await renderNav('messages');
    await loadConversations();
    if (currentOtherUid) openThread(currentOtherUid, null);
  });

  async function loadConversations() {
    const list = document.getElementById('convoList');
    try {
      const { conversations } = await api('/messages/conversations');
      if (!conversations.length) {
        list.innerHTML = '<p class="empty-state">No conversations yet. Message someone from your Orders page.</p>';
        return;
      }
      list.innerHTML = conversations.map(c => `
        <button class="convoItem w-full text-left px-2 py-2 rounded-lg hover:bg-slate-50 flex items-center justify-between" data-uid="${c.otherUid}">
          <span>
            <span class="block text-sm font-medium">${escapeHtml(c.otherName)}</span>
            <span class="block text-xs text-slate-500 truncate max-w-[180px]">${escapeHtml(c.lastMessage)}</span>
          </span>
          ${c.unread ? `<span class="stamp stamp-pending">${c.unread}</span>` : ''}
        </button>
      `).join('');
      list.querySelectorAll('.convoItem').forEach(btn =>
        btn.addEventListener('click', () => openThread(btn.dataset.uid)));
    } catch (err) {
      list.innerHTML = `<p class="empty-state" style="color:var(--brick)">${err.message}</p>`;
    }
  }

  async function openThread(otherUid) {
    currentOtherUid = otherUid;
    document.getElementById('threadWrap').classList.remove('hidden');
    document.getElementById('convoListWrap').classList.add('hide-mobile');
    if (pollTimer) clearInterval(pollTimer);
    await refreshThread();
    pollTimer = setInterval(refreshThread, 4000);
  }

  async function refreshThread() {
    try {
      const users = await api('/messages/conversations');
      const convo = users.conversations.find(c => c.otherUid === currentOtherUid);
      document.getElementById('threadName').textContent = convo ? convo.otherName : 'Conversation';

      const conversationId = [currentOtherUid, await myUid()].sort().join('_');
      currentConversationId = conversationId;
      const { messages } = await api(`/messages/${conversationId}`);
      renderMessages(messages);
    } catch (err) {
      document.getElementById('threadMessages').innerHTML = `<p class="empty-state" style="color:var(--brick)">${err.message}</p>`;
    }
  }

  let cachedUid = null;
  async function myUid() {
    if (cachedUid) return cachedUid;
    const { user } = await api('/auth/me');
    cachedUid = user.uid;
    return cachedUid;
  }

  function renderMessages(messages) {
    const container = document.getElementById('threadMessages');
    myUid().then((uid) => {
      container.innerHTML = messages.map(m => `
        <div class="bubble ${m.fromUid === uid ? 'bubble-mine' : 'bubble-theirs'}">
          ${escapeHtml(m.text)}
          ${m.attachmentUrl ? `<a href="${escapeAttr(m.attachmentUrl)}" target="_blank" rel="noopener" class="block mt-1 underline text-xs">Attachment ↗</a>` : ''}
          <span class="bubble-time">${new Date(m.createdAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>
        </div>
      `).join('') || '<p class="empty-state">Say hello 👋</p>';
      container.scrollTop = container.scrollHeight;
    });
  }

  document.getElementById('backToList').addEventListener('click', () => {
    document.getElementById('threadWrap').classList.add('hidden');
    document.getElementById('convoListWrap').classList.remove('hide-mobile');
    if (pollTimer) clearInterval(pollTimer);
  });

  document.getElementById('toggleAttachment').addEventListener('click', () => {
    document.getElementById('attachmentUrl').classList.toggle('hidden');
  });

  document.getElementById('sendForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const text = document.getElementById('messageText').value.trim();
    if (!text || !currentOtherUid) return;
    try {
      await api('/messages', {
        method: 'POST',
        body: {
          toUid: currentOtherUid,
          text,
          attachmentUrl: document.getElementById('attachmentUrl').value || undefined,
          requestId: pendingRequestId || undefined,
        },
      });
      document.getElementById('messageText').value = '';
      document.getElementById('attachmentUrl').value = '';
      pendingRequestId = null;
      await refreshThread();
      await loadConversations();
    } catch (err) {
      showToast(err.message, true);
    }
  });

  function escapeHtml(str) { const d = document.createElement('div'); d.textContent = str ?? ''; return d.innerHTML; }
  function escapeAttr(str) { return (str || '').replace(/"/g, '&quot;'); }
</script>
</body>
</html>
